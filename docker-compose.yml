name: crypto-market-mvp

services:
  timescaledb:
    image: timescale/timescaledb:2.27.0-pg16-oss
    container_name: crypto_timescaledb
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - timescaledb_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro

    environment:
      TZ: UTC
      PGTZ: UTC

    command: >
      postgres
      -c shared_preload_libraries=timescaledb
      -c timezone=UTC
      -c log_timezone=UTC
      -c max_connections=50
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=16MB
      -c maintenance_work_mem=128MB

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: crypto_pgadmin
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "127.0.0.1:5050:80"

    volumes:
      - pgadmin_data:/var/lib/pgadmin

    depends_on:
      timescaledb:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: crypto_app
    restart: "no"

    env_file:
      - .env

    environment:
      DB_HOST: timescaledb
      DB_PORT: 5432
      BYBIT_BASE_URL: https://api.bybit.com
      PYTHONPATH: /app

    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

    depends_on:
      timescaledb:
        condition: service_healthy
  
  telegram_proxy:
    build:
      context: ./docker/opera-proxy
      dockerfile: Dockerfile
      args:
        OPERA_PROXY_VERSION: v1.22.0

    container_name: crypto_telegram_proxy
    restart: unless-stopped

    command:
      - "-country"
      - "EU"
      - "-bind-address"
      - "0.0.0.0:18080"
      - "-server-selection"
      - "fastest"
      - "-init-retries"
      - "0"
      - "-verbosity"
      - "20"

    expose:
      - "18080"

volumes:
  timescaledb_data:
  pgadmin_data: